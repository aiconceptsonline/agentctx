name: Publish

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        default: patch
        type: choice
        options: [patch, minor, major]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create tags + releases

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install hatch build

      - name: Install and test
        run: |
          pip install -e ".[dev]"
          pytest

      - name: Bump version
        id: bump
        run: |
          hatch version ${{ github.event.inputs.bump }}
          NEW_VERSION=$(hatch version)
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Build wheel + sdist
        run: python -m build

      - name: Commit version bump and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/agentctx/_version.py
          git commit -m "chore: release ${{ steps.bump.outputs.tag }}"
          git tag ${{ steps.bump.outputs.tag }}
          git push
          git push origin ${{ steps.bump.outputs.tag }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ steps.bump.outputs.tag }} \
            dist/* \
            --title "agentctx ${{ steps.bump.outputs.tag }}" \
            --generate-notes
