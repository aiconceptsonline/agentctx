name: Research Watch

on:
  schedule:
    # Every Monday at 07:00 UTC
    - cron: "0 7 * * 1"
  workflow_dispatch:
    inputs:
      min_score:
        description: "Minimum relevance score (1–5)"
        required: false
        default: "4"
      dry_run:
        description: "Dry run (no file writes)"
        required: false
        default: false
        type: boolean

jobs:
  watch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[research]"

      - name: Install Claude CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Run research watch
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          MIN_SCORE="${{ github.event.inputs.min_score || '4' }}"
          DRY_RUN="${{ github.event.inputs.dry_run || 'false' }}"
          ARGS="--min-score $MIN_SCORE --verbose"
          if [ "$DRY_RUN" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          python scripts/research_watch.py $ARGS

      - name: Open GitHub issues for incorporated findings
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ ! -f research/pending-issues.json ]; then
            echo "No pending issues."
            exit 0
          fi
          python3 - <<'PYEOF'
          import json, subprocess, sys
          from pathlib import Path

          items = json.loads(Path("research/pending-issues.json").read_text())
          if not items:
              print("No incorporated items to open issues for.")
              sys.exit(0)

          for item in items:
              implications = "\n".join(f"- {i}" for i in item["agentctx_implications"])
              findings = "\n".join(f"- {f}" for f in item["key_findings"])
              body = f"""\
          ## Research finding

          **Source:** [{item['title']}]({item['url']})
          **Relevance score:** {item['score']}/5 — {item['reason']}

          ## Key findings

          {findings}

          ## agentctx implications

          {implications}

          ## PRD entry

          {item['prd_entry'] or '_No PRD entry extracted._'}

          ---

          @claude please review the implications above and implement any changes to agentctx that are clearly actionable. Use your judgment — skip anything speculative or already covered. Write tests for any new behaviour.
          """
              title = f"research: {item['title'][:72]}"
              result = subprocess.run(
                  ["gh", "issue", "create", "--title", title, "--body", body],
                  capture_output=True, text=True,
              )
              if result.returncode == 0:
                  print(f"Opened issue: {result.stdout.strip()}")
              else:
                  print(f"Failed: {result.stderr[:200]}", file=sys.stderr)

          Path("research/pending-issues.json").unlink()
          PYEOF

      - name: Commit updated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add PRD.md lessons-learned.json research/seen.json research/metrics.jsonl
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: weekly research digest $(date -u +%Y-%m-%d)"
            git pull --rebase
            git push
          fi
